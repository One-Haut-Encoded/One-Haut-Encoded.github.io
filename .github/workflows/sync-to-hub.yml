# AI-assisted (Cursor) -- https://cursor.com
name: Sync to Hugging Face hub
on:
  push:
    branches: [main] # Or 'master'
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push https://alexoh2020:$HF_TOKEN@huggingface.co/spaces/alexoh2020/onehaut_backend main
