name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      - name: Unshallow if needed
        run: |
          git fetch --unshallow || true

      - name: Configure git for HF
        run: |
          git config --global user.email "ci@github"
          git config --global user.name "GitHub Actions"

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://alexoh2020:${HF_TOKEN}@huggingface.co/spaces/alexoh2020/onehaut_backend || \
            git remote set-url hf https://alexoh2020:${HF_TOKEN}@huggingface.co/spaces/alexoh2020/onehaut_backend

          git config lfs.https://huggingface.co/spaces/alexoh2020/onehaut_backend.git.locksverify false
          GIT_LFS_SKIP_SMUDGE=1 git push --force hf main